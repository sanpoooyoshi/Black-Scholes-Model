<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日経225 オプション価格計算</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .glass-panel {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -1px rgba(0,0,0,.05);
    }
    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
      font-size: 16px;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 1;
      height: 28px;
    }
  </style>
</head>
<body class="min-h-screen p-3 md:p-8 text-gray-800">
  <div class="max-w-2xl mx-auto space-y-4">

    <!-- ヘッダー -->
    <header class="text-center pt-1 pb-2">
      <h1 class="text-xl font-bold text-indigo-900">日経225 オプション価格計算</h1>
      <p class="text-gray-400 text-[11px] mt-0.5">B-S モデル ／ スタンドアロン動作</p>
    </header>

    <!-- 価格サマリー -->
    <section class="grid grid-cols-2 gap-3">
      <div class="glass-panel bg-blue-50 py-5 rounded-2xl border border-blue-100 text-center">
        <div class="text-[11px] text-blue-500 font-medium mb-1">コール (C)</div>
        <div class="text-4xl font-bold text-blue-800"><span id="call-price">---</span></div>
        <div class="text-[11px] text-blue-400 mt-1">円</div>
      </div>
      <div class="glass-panel bg-red-50 py-5 rounded-2xl border border-red-100 text-center">
        <div class="text-[11px] text-red-500 font-medium mb-1">プット (P)</div>
        <div class="text-4xl font-bold text-red-800"><span id="put-price">---</span></div>
        <div class="text-[11px] text-red-400 mt-1">円</div>
      </div>
    </section>

    <!-- 行使価格別テーブル -->
    <section>
      <div class="glass-panel rounded-2xl border border-gray-100 shadow-md overflow-hidden">
        <div class="px-4 py-3 border-b border-gray-100">
          <h2 class="text-sm font-semibold text-indigo-800">📋 日経平均別オプション価格推移</h2>
          <p class="text-[10px] text-gray-400 mt-0.5">現在値 ±3000 ／ 500円刻み ／ 行使価格 K 固定 ／ スマイルカーブ適用</p>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-indigo-50 text-xs">
                <th class="py-2 px-4 text-left font-semibold text-indigo-700">日経平均 S</th>
                <th class="py-2 px-3 text-right font-semibold text-gray-600">IV (%)</th>
                <th class="py-2 px-4 text-right font-semibold text-blue-600">コール</th>
                <th class="py-2 px-4 text-right font-semibold text-red-600">プット</th>
              </tr>
            </thead>
            <tbody id="strike-table-body"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- パラメータ入力 -->
    <section>
      <div class="glass-panel p-4 rounded-2xl border border-gray-100 shadow-md">
        <h2 class="text-sm font-semibold mb-3 text-indigo-800">⚙️ パラメータ入力</h2>
        <form id="bs-form" class="space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label for="S" class="block text-[11px] font-medium text-gray-500 mb-1">現在値 S [円]</label>
              <input type="number" id="S" name="S" value="59000" step="10" required
                class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-base focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 bg-white">
            </div>
            <div>
              <label for="K" class="block text-[11px] font-medium text-gray-500 mb-1">行使価格 K [円]</label>
              <input type="number" id="K" name="K" value="56000" step="10" required
                class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-base focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 bg-white">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label for="T_days" class="block text-[11px] font-medium text-gray-500 mb-1">残存日数 [日]</label>
              <input type="number" id="T_days" name="T_days" value="6" step="1" required
                class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-base focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 bg-white">
            </div>
            <div>
              <label for="r" class="block text-[11px] font-medium text-gray-500 mb-1">金利 (r) [%]</label>
              <input type="number" id="r" name="r" value="0.1" step="0.01" required
                class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-base focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 bg-white">
            </div>
          </div>
          <!-- スマイルカーブ調整 -->
          <div class="p-3 bg-indigo-50/50 rounded-xl border border-indigo-100 space-y-3">
            <h3 class="text-[11px] font-bold text-indigo-800">スマイルカーブ (IV) 設定</h3>
            <div class="grid grid-cols-3 gap-2">
              <div>
                <label for="sigma_atm" class="block text-[10px] font-medium text-gray-500 mb-1">ATM IV [%]</label>
                <input type="number" id="sigma_atm" name="sigma_atm" value="18.7" step="0.1" required
                  class="w-full px-2 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 bg-white">
              </div>
              <div>
                <label for="skew" class="block text-[10px] font-medium text-gray-500 mb-1">Skew 係数</label>
                <input type="number" id="skew" name="skew" value="-154" step="1" required
                  class="w-full px-2 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 bg-white">
              </div>
              <div>
                <label for="convexity" class="block text-[10px] font-medium text-gray-500 mb-1">Convexity</label>
                <input type="number" id="convexity" name="convexity" value="0" step="1" required
                  class="w-full px-2 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 bg-white">
              </div>
            </div>
          </div>
        </form>
      </div>
    </section>

    <p class="text-center text-[10px] text-gray-300 pb-4">※ブラウザのみで計算。PCオフでも利用可能。</p>

  </div>
  <script src="./script.js?v=6"></script>
</body>
</html>
