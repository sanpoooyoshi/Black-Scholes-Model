<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日経225 オプション価格計算 (ブラックショールズ・モデル)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .glass-panel {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-gray-800">
  <div class="max-w-7xl mx-auto space-y-6">

    <!-- ヘッダー -->
    <header class="text-center mb-4">
      <h1 class="text-2xl md:text-3xl font-bold text-indigo-900 mb-1">日経225 オプション価格計算</h1>
      <p class="text-gray-500 text-xs">ブラック・ショールズ方程式による理論価格と損益シミュレーション</p>
    </header>

    <!-- ========== グラフ（最上部・全幅） ========== -->
    <section>
      <div class="glass-panel p-4 rounded-2xl flex flex-col border border-gray-100 shadow-md">
        <h2 class="text-base font-semibold mb-3 text-indigo-800 border-b pb-2">損益シミュレーション</h2>
        <div class="relative w-full" style="height:300px;">
          <canvas id="optionChart"></canvas>
        </div>
        <p class="text-[10px] text-gray-400 mt-2 text-center">※ブラウザ側で計算するためPCオフでも動作します。</p>
      </div>
    </section>

    <!-- ========== 価格サマリー（グラフ直下） ========== -->
    <section class="grid grid-cols-2 gap-3">
      <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 text-center glass-panel">
        <div class="text-xs text-blue-600 mb-0.5">現在価格 コール (C)</div>
        <div class="text-2xl font-bold text-blue-900"><span id="call-price">---</span></div>
        <div class="text-xs text-blue-500">円</div>
      </div>
      <div class="bg-red-50 p-3 rounded-xl border border-red-100 text-center glass-panel">
        <div class="text-xs text-red-600 mb-0.5">現在価格 プット (P)</div>
        <div class="text-2xl font-bold text-red-900"><span id="put-price">---</span></div>
        <div class="text-xs text-red-500">円</div>
      </div>
    </section>

    <!-- ========== パラメータ入力 + 期待計算（下段） ========== -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- 左: パラメータ入力 -->
      <section>
        <div class="glass-panel p-5 rounded-2xl border border-gray-100 shadow-md">
          <h2 class="text-base font-semibold mb-3 text-indigo-800 border-b pb-2">パラメータ入力</h2>
          <form id="bs-form" class="space-y-3">
            <div>
              <label for="S" class="block text-xs font-medium text-gray-500 mb-1">日経225 現在値 (S) [円]</label>
              <input type="number" id="S" name="S" value="60000" step="10" required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>
            <div>
              <label for="K" class="block text-xs font-medium text-gray-500 mb-1">行使価格 (K) [円]</label>
              <input type="number" id="K" name="K" value="59000" step="10" required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>
            <div>
              <label for="T_days" class="block text-xs font-medium text-gray-500 mb-1">残存日数 [日]</label>
              <input type="number" id="T_days" name="T_days" value="3" step="1" required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>
            <div>
              <label for="sigma" class="block text-xs font-medium text-gray-500 mb-1">ボラティリティ (σ) [%]</label>
              <input type="number" id="sigma" name="sigma" value="20" step="0.1" required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>
            <div>
              <label for="r" class="block text-xs font-medium text-gray-500 mb-1">無リスク金利 (r) [%]</label>
              <input type="number" id="r" name="r" value="0.1" step="0.01" required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>
            <div>
              <label for="range_width" class="block text-xs font-semibold text-indigo-700 mb-1">グラフ表示範囲 (±円)</label>
              <input type="number" id="range_width" name="range_width" value="5000" step="100" required
                class="w-full px-3 py-2 border border-indigo-200 bg-indigo-50/20 rounded-lg text-sm font-bold focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>
            <button type="submit"
              class="w-full mt-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors text-sm shadow">
              計算実行
            </button>
          </form>
        </div>
      </section>

      <!-- 右: 期待計算 -->
      <section>
        <div class="glass-panel p-5 rounded-2xl border border-gray-100 shadow-md h-full">
          <h2 class="text-base font-semibold mb-3 text-indigo-800 border-b pb-2">期待計算（ターゲット設定）</h2>
          <div class="space-y-3">
            <div>
              <label for="S_future" class="block text-xs font-medium text-gray-400 mb-1">将来の日経平均 (S') [円]</label>
              <input type="number" id="S_future" name="S_future" value="60000" step="10"
                class="w-full px-3 py-2 border border-indigo-100 bg-indigo-50/30 rounded-lg text-sm focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>
            <div>
              <label for="T_future" class="block text-xs font-medium text-gray-400 mb-1">将来の残存日数 [日]</label>
              <input type="number" id="T_future" name="T_future" value="1" step="1"
                class="w-full px-3 py-2 border border-indigo-100 bg-indigo-50/30 rounded-lg text-sm focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>
          </div>

          <div class="mt-5 space-y-3">
            <p class="text-xs font-semibold text-gray-500">期待損益 (1枚あたり)</p>
            <div class="bg-white border border-blue-100 rounded-xl p-3 flex justify-between items-center shadow-sm">
              <div class="text-sm font-bold text-blue-800">コール 期待</div>
              <div class="text-right">
                <div id="call-future-price" class="text-xs text-gray-400">---</div>
                <div id="call-expected-pl" class="text-base font-black">---</div>
              </div>
            </div>
            <div class="bg-white border border-red-100 rounded-xl p-3 flex justify-between items-center shadow-sm">
              <div class="text-sm font-bold text-red-800">プット 期待</div>
              <div class="text-right">
                <div id="put-future-price" class="text-xs text-gray-400">---</div>
                <div id="put-expected-pl" class="text-base font-black">---</div>
              </div>
            </div>
          </div>
        </div>
      </section>

    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
